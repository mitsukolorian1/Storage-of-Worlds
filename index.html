<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Библиотека персонажей · все книги</title>
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== ОБЩИЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #f5efe9;
            color: #2c2c2c;
            line-height: 1.5;
            padding: clamp(10px, 2vw, 20px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page {
            max-width: min(1300px, 95%);
            margin: 0 auto;
            background: #fffcf8;
            border-radius: max(20px, 2.5vw);
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
            padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 3vw, 2.5rem);
            width: 100%;
            flex: 1;
        }

        /* ========== НАВИГАЦИЯ ========== */
        .breadcrumb-nav {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 1rem;
            margin-bottom: clamp(1.5rem, 4vh, 2.5rem);
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            background: #f0e7de;
            padding: 0.8rem 1.5rem;
            border-radius: 48px;
            word-break: break-word;
        }

        .breadcrumb-nav a {
            color: #5e3c28;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: 0.2s;
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            .breadcrumb-nav a { white-space: normal; }
        }

        .breadcrumb-nav a:hover {
            color: #a75b36;
            text-decoration: underline;
        }

        .breadcrumb-nav .separator {
            color: #b0927e;
            font-weight: 300;
            font-size: 1.2rem;
        }

        /* ========== ЗАГОЛОВКИ ========== */
        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #3e2c1f;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            word-break: break-word;
        }

        h1 i {
            color: #b07d5e;
            font-size: 1.2em;
        }

        .subhead {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #6f5340;
            margin-bottom: 2rem;
            border-left: 6px solid #dbb79b;
            padding-left: 1.2rem;
        }

        /* ========== ГЛАВНАЯ СЕТКА КНИГ ========== */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(1rem, 2.5vw, 2rem);
            margin: 2rem 0 3rem;
        }

        @media (max-width: 800px) {
            .grid-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 500px) {
            .grid-cards {
                grid-template-columns: 1fr;
            }
        }

        .book-card {
            background: #fff5ed;
            border-radius: 28px;
            padding: 1.8rem 1rem 1.2rem;
            box-shadow: 0 10px 18px -6px rgba(98, 64, 46, 0.15);
            transition: transform 0.15s ease, box-shadow 0.2s;
            border: 1px solid #ffe8da;
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 28px -14px #ab7f63;
        }

        .book-icon {
            font-size: clamp(2.5rem, 6vw, 3.8rem);
            color: #b25f39;
            margin-bottom: 0.5rem;
            flex-shrink: 0;
        }

        .book-title {
            font-size: clamp(1.4rem, 3vw, 1.9rem);
            font-weight: 600;
            margin: 0.25rem 0 0.5rem;
            word-break: break-word;
            flex-shrink: 0;
            min-height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-meta {
            color: #7c6050;
            margin-bottom: 0.8rem;
            font-size: clamp(0.8rem, 2vw, 0.95rem);
            flex-shrink: 0;
            min-height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .folder-links {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 0.8rem 0 0.4rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .folder-link {
            background: #e6d5c8;
            color: #402e22;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: clamp(0.8rem, 2vw, 0.95rem);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
            transition: 0.2s;
            border: 1px solid #dabdab;
            white-space: nowrap;
        }
        @media (max-width: 400px) {
            .folder-link { white-space: normal; }
        }

        .folder-link i {
            font-size: 0.9rem;
            color: #a75b36;
        }

        .folder-link:hover {
            background: #cfb6a4;
            color: #22170f;
            border-color: #b28466;
        }

        .book-card p {
            margin-top: 0.8rem;
            color: #5f4a3a;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            word-break: break-word;
            overflow-wrap: break-word;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== СТРАНИЦА КНИГИ ========== */
        .book-sections {
            display: flex;
            gap: clamp(1rem, 3vw, 2rem);
            margin: 2rem 0 3rem;
            flex-wrap: wrap;
        }

        .section-folder {
            flex: 1 1 280px;
            background: #f3e7de;
            border-radius: 2.5rem;
            padding: clamp(1.5rem, 3vw, 2.5rem) clamp(1.2rem, 2.5vw, 2rem);
            box-shadow: 0 8px 22px -8px #b9a089;
            transition: 0.2s;
            border: 2px solid #ebdad0;
            width: 100%;
            max-width: 100%;
            overflow-wrap: break-word;
        }

        .folder-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: #834e31;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .folder-header h2 {
            font-size: clamp(1.3rem, 3.5vw, 1.8rem);
            font-weight: 600;
            color: #4e3626;
        }

        .folder-link-inside {
            display: inline-block;
            margin-top: 1rem;
            background: #dac2b2;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            color: #2f1d12;
            text-decoration: none;
            font-weight: 500;
            border: 1px solid #b58f78;
            font-size: clamp(0.9rem, 2vw, 1rem);
            word-break: break-word;
        }

        .folder-link-inside i {
            margin-right: 0.5rem;
        }

        .folder-link-inside:hover {
            background: #c5a48b;
        }

        /* ========== СПИСОК ПЕРСОНАЖЕЙ ========== */
        .character-item {
            background: #fefbf9;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            margin: 0.8rem 0;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            border: 1px solid #ddc8ba;
            box-shadow: 0 2px 6px #e3cfc0;
            width: 100%;
            overflow-wrap: break-word;
        }

        .character-item a {
            text-decoration: none;
            color: #412f24;
            font-weight: 500;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            word-break: break-word;
        }

        .character-item i {
            color: #b2653b;
            width: 1.6rem;
            text-align: center;
        }

        .character-item:hover {
            background: #ead9cd;
        }

        /* ========== СТРАНИЦА СЮЖЕТА ========== */
        .book-cover {
            background: #f3e0d1;
            border-radius: 48px 48px 16px 16px;
            padding: clamp(1.5rem, 4vw, 2.5rem);
            margin: 2rem 0;
            border: 1px solid #dbb59b;
            box-shadow: 0 10px 20px rgba(80, 50, 30, 0.15);
            position: relative;
            width: 100%;
        }

        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 2rem 0;
        }

        .chapter-item {
            background: #fcf3ea;
            border-radius: 60px;
            border: 1px solid #dbbcac;
            transition: 0.2s;
            width: 100%;
        }

        .chapter-item a {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: #3f2a1b;
            font-weight: 500;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            gap: 1rem;
            flex-wrap: wrap;
            word-break: break-word;
        }

        .chapter-item i {
            color: #b2653b;
            font-size: 1.6rem;
            width: 2rem;
        }

        .chapter-item:hover {
            background: #e7cfbe;
            transform: translateX(6px);
        }

        /* ========== СТРАНИЦА ГЛАВЫ (С КРАСНОЙ СТРОКОЙ) ========== */
        .chapter-page {
            background: #fcf3ea;
            border-radius: 48px;
            padding: clamp(1.5rem, 4vw, 2.5rem);
            margin: 2rem 0;
            border: 2px solid #e3cbbd;
            width: 100%;
        }

        .chapter-title {
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            color: #4e3322;
            border-bottom: 3px dashed #cbaa93;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            word-break: break-word;
        }

        /* СТИЛИ ДЛЯ КРАСНОЙ СТРОКИ */
        .chapter-content {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            line-height: 1.8;
            background: #fff9f2;
            padding: clamp(1.2rem, 3vw, 2rem);
            border-radius: 32px;
            border: 1px solid #e4cfbf;
            word-break: break-word;
            overflow-wrap: break-word;
            text-align: justify; /* выравнивание по ширине */
        }

        .chapter-content p {
            text-indent: 30px; /* красная строка - отступ первой строки */
            margin: 0 0 15px 0; /* отступ между абзацами */
        }

        .chapter-content p:last-child {
            margin-bottom: 0; /* убираем отступ у последнего абзаца */
        }

        /* ========== СТРАНИЦА ПЕРСОНАЖА ========== */
        .character-page {
            background: #faf1ea;
            border-radius: 48px;
            padding: clamp(1.5rem, 3vw, 2rem);
            width: 100%;
        }

        .character-page > div {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
            gap: 2rem;
        }

        /* ========== ГАЛЕРЕЯ АРТОВ ========== */
        .art-thumb-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1rem 0 0;
        }

        .art-thumb {
            width: clamp(80px, 15vw, 100px);
            height: clamp(80px, 15vw, 100px);
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid #f0dccc;
            transition: 0.2s;
            cursor: pointer;
            background: #dac2b2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .art-thumb:hover {
            transform: scale(1.05);
            border-color: #b96f42;
            box-shadow: 0 8px 12px rgba(0,0,0,0.2);
        }

        /* ========== МОДАЛЬНОЕ ОКНО ========== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255,255,240,0.3);
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1001;
        }

        .modal-close:hover {
            color: #dbb79b;
            transform: scale(1.2);
        }

        /* ========== КНОПКИ ========== */
        .back-home {
            display: inline-block;
            margin: 2rem 0 1rem;
            background: #f0e2d8;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 500;
            color: #3f2a1b;
            text-decoration: none;
            border: 1px solid #dbbcac;
            font-size: clamp(0.9rem, 2vw, 1rem);
        }

        hr {
            border: 1px dashed #cfb7a9;
            margin: 2rem 0;
        }

        /* ========== ПОДВАЛ ========== */
        footer {
            text-align: center;
            color: #896e5b;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid #e7d2c4;
            width: 100%;
        }

        .author-credits {
            background: #f0e4da;
            border-radius: 60px;
            padding: 1.5rem 1rem;
            margin-top: 1rem;
            font-size: clamp(0.8rem, 2.2vw, 1rem);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            width: 100%;
        }

        .author-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1rem 1.5rem;
            width: 100%;
        }

        .author-name {
            font-weight: 600;
            color: #5e3823;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }
        @media (max-width: 500px) {
            .author-name { white-space: normal; }
        }

        .author-row a {
            color: #794f36;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-weight: 500;
            transition: 0.2s;
            word-break: break-word;
        }

        .footer-note {
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        img, svg, iframe {
            max-width: 100%;
            height: auto;
        }
        p, h1, h2, h3, div {
            overflow-wrap: break-word;
            word-wrap: break-word;
            hyphens: auto;
        }
    </style>
</head>

                       <p>Просторный дом, маячивший за зарослями лаванды, был не убежищем, а злой иронией.

                        story: 'Некогда грозный Бич Небес, участвовавший в первой войне против Света, Малахит пал не в битве, а от изощрённой жестокости милосердия. Ангел по имени Элемия не стала его уничтожать, а приговорила к «спасению через труд». Она запечатала его душу в смертном саду, приковав к земле заклятием, которое вынуждает его лелеять жизнь — то, что он больше всего ненавидит. Вокруг кипит беззаботное счастье семьи, живущей в доме, но Малахит видит лишь фальшь. Годы, текущие как смола, он провёл в поисках слабого места в заклятии. Он понял: тюрьма рухнет, если он сможет доказать, что этот «рай» прогнил изнутри. Сейчас он — терпеливый наблюдатель, сеющий семена раздора и ждущий, когда его «сад» принесёт урожай ненависти, чтобы восстать из пепла уже не садовником, а Князем Разрушения.',

                        refs: 'Ангел Приговора (она же Вестница Тишины). Возраст неизвестен, выглядит на вечную молодость.  В движениях — пугающая безмятежность, в улыбке — ледяная доброта. Её голос действительно напоминает колокольный звон: чистый, пронзительный.', 
                        story: 'Элемия не из тех ангелов, что сражаются на передовой. Она — палач милосердия. Именно к ней отправляли непокорных демонов, которых нельзя было убить, но можно было «исцелить». Малахит стал её самым трудным пациентом. Вместо меча она выбрала для него сад, вместо цепи — укоренение к земле. Она поселилась неподалёку, в скромном домике за лавандовым полем, чтобы наблюдать за своим «экспериментом» лично. Каждое утро она срезает розы для дома, не подозревая (или делая вид, что не подозревает), что цветы пропитаны ненавистью её пленника. ХХХ свято верит, что доброта и красота способны переплавить даже демоническую сущность. Она ждёт от Малахита покаяния. Она не понимает, что своей «заботой» растит не смирение, а идеальное оружие против себя самой. Их противостояние — это тихая война, где вместо клинков — взгляды, а вместо крови — аромат удушливого лицемерия.',

                    { 
                        name: 'Кассиэль', 
                        folder: 'cassiel', 
                        refs: 'Младший ангел-архитектор снов (он же Хранитель Неправильных Снов). Выглядит на пятнадцать человеческих лет, хотя его истинный возраст исчисляется парой столетий — по небесным меркам сущий младенец. Крылья покрыты мягким пушком с редкими перьями, которые топорщатся в разные стороны, словно у взъерошенного воробья. У него открытое веснушчатое лицо, вечно перепачканное золотой пылью, и глаза, горящие искренним желанием сделать мир лучше — даже если для этого придется нарушить все инструкции.', 
                        story: 'Кассиэль готовился стать ангелом-хранителем, но из-за бюрократической ошибки в Небесной Канцелярии (куда подали не те бланки, заверенные не теми серафимами) оказался в Звездном Бюро Снов. Возвращать и переоформлять было некогда — в Бюро начиналась утренняя сверка, и требовались лишние руки. Так Кассиэль попал под крыло (во всех смыслах) Дрёмы, звезды-секретаря с многотысячелетним стажем. Кассиэль работает под ее пристальным, но чуть более снисходительным надзором, а по ночам тайком рисует на полях бланков маленькие звездочки — просто так, для настроения.',

                        name: 'Амелия',

                        story: 'Амелия — редкий экземпляр в небесной иерархии: полукровка, дитя случайной связи демона-крысы (бывает и такое) и ангела. Она с детства умела работать цифрами так, что любые махинации выглядели как божественное провидение. Её взяли в Канцелярию на испытательный срок семьсот лет назад — и до сих пор не могут отдать приказ об увольнении, потому что, когда Амелия уходит в отпуск, небесная бухгалтерия рушится за три дня. Она ненавидит свою работу, но ненавидит её правильно — с тихим, методичным отчаянием профессионала. Иногда, когда начальство не видит, Амелия позволяет себе маленькие хитрости: перекидывает пару грехов из одной графы в другую, чуть-чуть занижает доходы особенно противным серафимам, или, наоборот, подкидывает удачу тем грешникам, которые вовремя сдают отчетность. Делает она это не из доброты — просто ей нравится наблюдать за хаосом, который потом начинается в отделах. В ее столе, в ящике с надписью «Акты сверки за первую тысячу лет», хранится личный тайный архив компромата на всех, от херувимов до архангелов. На всякий случай. Хвост вьется, зубы точатся, баланс сходится. Амелия пьет двадцатую чашку амброзийного кофе за смену и мечтает о пенсии, которая ей не светит ближайшие три тысячи лет.',

                        story: 'Не совсем монстр. Оно пытается предупредить Лену об опасности, но из-за страха девушки выглядит угрожающе.', 
                        arts: [
                            { thumb: ' ', full: ' ' },
                            { thumb: ' ', full: ' ' },
                            { thumb: ' ', full: ' ' }
                        ]
                    }
                ]
            }
        ];

        // ========== ПЕРЕМЕННЫЕ СОСТОЯНИЯ ==========
        let currentRoute = { page: 'home', bookId: null, chapterId: null, characterFolder: null };

        const breadcrumbDiv = document.getElementById('breadcrumb');
        const contentDiv = document.getElementById('content-container');
        const modal = document.getElementById('art-modal');
        const modalImg = document.getElementById('modal-image');
        const modalClose = document.getElementById('modal-close');

        // ========== ФУНКЦИИ МОДАЛЬНОГО ОКНА ==========
        function openModal(imgSrc) {
            modalImg.src = imgSrc;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        window.openModal = openModal;

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function findBook(bookId) {
            return booksData.find(b => b.id === bookId) || null;
        }

        function findCharacter(book, folderName) {
            if (!book) return null;
            return book.characters.find(ch => ch.folder === folderName) || null;
        }

        // ========== НАВИГАЦИОННАЯ ЦЕПОЧКА ==========
        function renderBreadcrumb() {
            let html = '<a href="#"><i class="fas fa-book-open"></i> Все миры</a>';
            const route = currentRoute;

            if (route.page === 'book') {
                const book = findBook(route.bookId);
                if (book) html += `<span class="separator">›</span> <a href="#book/${book.id}"><i class="fas fa-folder-open"></i> ${book.title}</a>`;
            } else if (route.page === 'plot') {
                const book = findBook(route.bookId);
                if (book) {
                    html += `<span class="separator">›</span> <a href="#book/${book.id}"><i class="fas fa-folder-open"></i> ${book.title}</a>`;
                    html += `<span class="separator">›</span> <span><i class="fas fa-book"></i> Сюжет</span>`;
                }
            } else if (route.page === 'chapter') {
                const book = findBook(route.bookId);
                if (book) {
                    html += `<span class="separator">›</span> <a href="#book/${book.id}"><i class="fas fa-folder-open"></i> ${book.title}</a>`;
                    html += `<span class="separator">›</span> <a href="#book/${book.id}/plot"><i class="fas fa-book"></i> Сюжет</a>`;
                    const chapter = book.chapters?.find(ch => ch.id === route.chapterId);
                    if (chapter) html += `<span class="separator">›</span> <span>${chapter.title}</span>`;
                }
            } else if (route.page === 'character') {
                const book = findBook(route.bookId);
                if (book) {
                    html += `<span class="separator">›</span> <a href="#book/${book.id}"><i class="fas fa-folder-open"></i> ${book.title}</a>`;
                    const character = findCharacter(book, route.characterFolder);
                    if (character) html += `<span class="separator">›</span> <span><i class="fas fa-user"></i> ${character.name}</span>`;
                }
            }
            breadcrumbDiv.innerHTML = html;
        }

        // ========== ГЛАВНАЯ СТРАНИЦА ==========
        function renderHome() {
            let html = `
                <h1><i class="fas fa-chess-queen"></i> Хранилище миров</h1>
                <div class="subhead">Книги, персонажи, референсы и истории</div>
                <div class="grid-cards">
            `;
            booksData.forEach(book => {
                html += `
                    <div class="book-card">
                        <div class="book-icon"><i class="fas fa-book"></i></div>
                        <div class="book-title">${book.title}</div>
                        <div class="book-meta">${book.coverDesc}</div>
                        <div class="folder-links">
                            <a href="#book/${book.id}" class="folder-link"><i class="fas fa-folder"></i> открыть книгу</a>
                        </div>
                        <p>${book.description.substring(0,45)}…</p>
                    </div>
                `;
            });
            html += `</div>`;
            contentDiv.innerHTML = html;
        }

        // ========== СТРАНИЦА КНИГИ ==========
        function renderBookPage(bookId) {
            const book = findBook(bookId);
            if (!book) { contentDiv.innerHTML = '<h2>Книга не найдена</h2><a href="#">← на главную</a>'; return; }

            let charactersHtml = '';
            book.characters.forEach(ch => {
                charactersHtml += `
                    <div class="character-item">
                        <a href="#book/${book.id}/character/${ch.folder}">
                            <i class="fas fa-user"></i> ${ch.name}
                            <span style="margin-left:auto;"><i class="fas fa-chevron-right"></i></span>
                        </a>
                    </div>
                `;
            });

            let html = `
                <h1><i class="fas fa-folder-open"></i> ${book.title}</h1>
                <p style="margin-bottom:2rem; font-size:1.2rem;">${book.description}</p>
                <div class="book-sections">
                    <div class="section-folder">
                        <div class="folder-header"><i class="fas fa-folder"></i><h2> Книга</h2></div>
                        <div class="inside-folder">
                            <p style="margin-bottom:1.5rem;">Содержание, главы, сюжет.</p>
                            <a href="#book/${book.id}/plot" class="folder-link-inside"><i class="fas fa-scroll"></i> читать сюжет (книга по главам)</a>
                        </div>
                    </div>
                    <div class="section-folder">
                        <div class="folder-header"><i class="fas fa-folder"></i><h2> Персонажи</h2></div>
                        <div class="inside-folder">${charactersHtml}</div>
                    </div>
                </div>
                <a href="#" class="back-home"><i class="fas fa-arrow-left"></i> ко всем книгам</a>
            `;
            contentDiv.innerHTML = html;
        }

        // ========== СТРАНИЦА СЮЖЕТА ==========
        function renderPlotPage(bookId) {
            const book = findBook(bookId);
            if (!book) { contentDiv.innerHTML = '<h2>Книга не найдена</h2>'; return; }

            let chaptersHtml = '';
            if (book.chapters && book.chapters.length) {
                book.chapters.forEach(ch => {
                    chaptersHtml += `
                        <div class="chapter-item">
                            <a href="#book/${book.id}/plot/${ch.id}">
                                <i class="fas fa-bookmark"></i> ${ch.title}
                            </a>
                        </div>
                    `;
                });
            } else {
                chaptersHtml = '<p>Главы ещё не добавлены.</p>';
            }

            let html = `
                <h1><i class="fas fa-book-open"></i> ${book.title} — книга</h1>
                <div class="book-cover">
                    <h2 style="font-size:2.2rem; margin-bottom:2rem;"> Оглавление</h2>
                    <div class="chapter-list">
                        ${chaptersHtml}
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <a href="#book/${book.id}" class="back-home"><i class="fas fa-arrow-left"></i> назад к книге</a>
                    <a href="#" class="back-home"><i class="fas fa-globe"></i> главная</a>
                </div>
            `;
            contentDiv.innerHTML = html;
        }

        // ========== СТРАНИЦА ГЛАВЫ ==========
        function renderChapterPage(bookId, chapterId) {
            const book = findBook(bookId);
            if (!book) { contentDiv.innerHTML = '<h2>Книга не найдена</h2>'; return; }
            const chapter = book.chapters?.find(ch => ch.id === chapterId);
            if (!chapter) { contentDiv.innerHTML = '<h2>Глава не найдена</h2>'; return; }

            let html = `
                <h1><i class="fas fa-feather"></i> ${book.title}</h1>
                <div class="chapter-page">
                    <div class="chapter-title">${chapter.title}</div>
                    <div class="chapter-content">${chapter.content}</div>
                </div>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <a href="#book/${book.id}/plot" class="back-home"><i class="fas fa-arrow-left"></i> к оглавлению</a>
                    <a href="#book/${book.id}" class="back-home"><i class="fas fa-folder-open"></i> страница книги</a>
                </div>
            `;
            contentDiv.innerHTML = html;
        }

        // ========== СТРАНИЦА ПЕРСОНАЖА ==========
        function renderCharacterPage(bookId, folderName) {
            const book = findBook(bookId);
            if (!book) { contentDiv.innerHTML = '<h2>Книга не найдена</h2>'; return; }
            const character = findCharacter(book, folderName);
            if (!character) { contentDiv.innerHTML = '<h2>Персонаж не найден</h2>'; return; }

            let artsGrid = '';
            if (character.arts && character.arts.length) {
                artsGrid = '<div class="art-thumb-grid">';
                character.arts.forEach((art, index) => {
                    artsGrid += `
                        <div class="art-thumb" onclick="window.openModal('${art.full}')">
                            <img src="${art.thumb}" alt="Арт ${index+1}" loading="lazy">
                        </div>
                    `;
                });
                artsGrid += '</div>';
            } else {
                artsGrid = '<p>🖌️ арты пока не добавлены</p>';
            }

            let html = `
                <div style="display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; margin-bottom:2rem;">
                    <h1><i class="fas fa-user-circle"></i> ${character.name}</h1>
                    <span style="background:#e7d4c5; padding:0.3rem 1.2rem; border-radius:40px;">${book.title}</span>
                </div>
                <div class="character-page">
                    <div>
                        <div>
                            <h3><i class="fas fa-id-card"></i> о персонаже</h3>
                            <p style="background:white; border-radius:28px; padding:1.5rem;">${character.refs}</p>
                            <h3 style="margin-top:1.8rem;"><i class="fas fa-feather"></i> история</h3>
                            <p style="background:white; border-radius:28px; padding:1.5rem;">${character.story}</p>
                        </div>
                        <div>
                            <h3><i class="fas fa-palette"></i> арты</h3>
                            ${artsGrid}
                        </div>
                    </div>
                </div>
                <div style="margin-top:2rem; display:flex; gap:1rem; flex-wrap:wrap;">
                    <a href="#book/${book.id}" class="back-home"><i class="fas fa-arrow-left"></i> назад к книге</a>
                    <a href="#" class="back-home"><i class="fas fa-globe"></i> главная</a>
                </div>
            `;
            contentDiv.innerHTML = html;
        }

        // ========== РОУТИНГ ==========
        function route() {
            const hash = window.location.hash.slice(1) || '/';
            if (hash === '' || hash === '/') {
                currentRoute = { page: 'home' };
                renderHome();
            } else if (hash.startsWith('book/')) {
                const parts = hash.split('/');
                const bookId = parts[1];
                if (parts.length === 2) {
                    currentRoute = { page: 'book', bookId };
                    renderBookPage(bookId);
                } else if (parts.length === 3 && parts[2] === 'plot') {
                    currentRoute = { page: 'plot', bookId };
                    renderPlotPage(bookId);
                } else if (parts.length === 4 && parts[2] === 'plot') {
                    currentRoute = { page: 'chapter', bookId, chapterId: parts[3] };
                    renderChapterPage(bookId, parts[3]);
                } else if (parts.length === 4 && parts[2] === 'character') {
                    currentRoute = { page: 'character', bookId, characterFolder: parts[3] };
                    renderCharacterPage(bookId, parts[3]);
                } else {
                    currentRoute = { page: 'home' };
                    renderHome();
                }
            } else {
                currentRoute = { page: 'home' };
                renderHome();
            }
            renderBreadcrumb();
        }

        window.addEventListener('hashchange', route);
        window.addEventListener('DOMContentLoaded', () => {
            if (!window.location.hash || window.location.hash === '#') window.location.hash = '#';
            route();
        });
    })();
</script>
